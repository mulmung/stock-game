<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주식 게임 v2</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #070b12;
      color: #ffffff;
    }
    body {
      overflow-x: hidden;
    }
    .app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(33, 150, 243, 0.22), transparent 36%),
        linear-gradient(180deg, #101827 0%, #070b12 100%);
    }
    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 620px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(10, 16, 26, 0.92);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      position: relative;
      overflow: hidden;
    }
    .center-panel {
      min-height: 620px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px;
      gap: 18px;
      text-align: center;
    }
    .title {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -1px;
      margin: 0;
    }
    .subtitle {
      margin: 0;
      color: rgba(255,255,255,0.68);
      line-height: 1.55;
      font-size: 14px;
    }
    .input {
      width: 100%;
      height: 52px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
      border-radius: 0;
      padding: 0 14px;
      font-size: 16px;
      text-align: center;
    }
    .input:focus {
      border-color: #2f8cff;
      box-shadow: 0 0 0 3px rgba(47, 140, 255, 0.18);
    }
    .btn {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 0;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: #fff;
      background: #1976ff;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      filter: grayscale(0.5);
    }
    .google-btn {
      background: #ffffff;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .google-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border: 1px solid #d1d5db;
      font-weight: 900;
      border-radius: 50%;
    }
    .game-screen {
      min-height: 620px;
      padding: 22px 18px 92px;
      display: none;
    }
    .top-card {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      padding: 18px;
      margin-bottom: 14px;
    }
    .top-card h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: -0.5px;
    }
    .top-card p {
      margin: 0;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      font-size: 14px;
    }
    .notice {
      border: 1px dashed rgba(255,255,255,0.18);
      padding: 18px;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      line-height: 1.55;
    }
    .bottom-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 74px;
      padding: 10px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: 82px 1fr 92px;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.12);
      background: rgba(5, 9, 16, 0.96);
      backdrop-filter: blur(12px);
    }
    .bar-btn {
      border: 0;
      border-radius: 0;
      background: #1976ff;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      min-width: 0;
    }
    .bar-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #334155;
    }
    .bar-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      min-width: 0;
      overflow: hidden;
      padding: 0 8px;
    }
    .nickname {
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cash {
      width: 100%;
      text-align: center;
      font-size: 17px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 92px;
      padding: 13px 14px;
      background: rgba(25, 118, 255, 0.96);
      color: #fff;
      font-weight: 900;
      text-align: center;
      display: none;
      z-index: 10;
    }
    .loading {
      position: absolute;
      inset: 0;
      background: #070b12;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.75);
      z-index: 99;
      font-weight: 800;
    }
    .error {
      color: #ff7b7b;
      font-size: 13px;
      line-height: 1.5;
      min-height: 20px;
    }
    .hidden { display: none !important; }
    @media (max-width: 460px) {
      .app { padding: 0; align-items: stretch; }
      .screen {
        max-width: none;
        min-height: 100vh;
        border: 0;
      }
      .center-panel { min-height: 100vh; }
      .game-screen { min-height: 100vh; }
      .bottom-bar { position: fixed; }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="screen">
      <div id="loading" class="loading">불러오는 중...</div>

      <section id="loginScreen" class="center-panel hidden">
        <h1 class="title">주식 게임</h1>
        <p class="subtitle">구글 로그인 후 닉네임을 등록하면<br />초기 자금 1,000,000원을 받고 시작합니다.</p>
        <button id="googleLoginBtn" class="btn google-btn">
          <span class="google-icon">G</span>
          Google 로그인
        </button>
        <p id="loginError" class="error"></p>
      </section>

      <section id="nicknameScreen" class="center-panel hidden">
        <h1 class="title">닉네임 설정</h1>
        <p class="subtitle">게임에서 사용할 닉네임을 입력해주세요.</p>
        <input id="nicknameInput" class="input" type="text" maxlength="12" placeholder="닉네임 입력" autocomplete="off" />
        <button id="startBtn" class="btn" disabled>시작하기</button>
        <p id="nicknameError" class="error"></p>
      </section>

      <section id="gameScreen" class="game-screen">
        <div class="top-card">
          <h1>주식 게임</h1>
          <p>현재는 1차 기본 구조입니다. 구글 로그인, 닉네임 저장, 보유현금 저장, 돈벌기 60초 쿨타임이 적용되어 있습니다.</p>
        </div>
        <div class="notice">
          다음 단계에서 종목, 차트, 매수/매도, 거래내역, 우편함, 은행 기능을 이 구조 위에 하나씩 붙이면 됩니다.
        </div>

        <div id="toast" class="toast"></div>

        <nav class="bottom-bar">
          <button id="menuBtn" class="bar-btn">☰ 메뉴</button>
          <div class="bar-center">
            <div id="nicknameLabel" class="nickname">-</div>
            <div id="cashLabel" class="cash">0원</div>
          </div>
          <button id="earnBtn" class="bar-btn">돈벌기</button>
        </nav>
      </section>
    </main>
  </div>

  <script type="module">
    /********************************************************************
     * 1) Firebase 설정
     * Firebase 설정값 입력 완료 버전입니다.
     ********************************************************************/
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOWdfAtywZ9UWEcFcsr0N5KI3D66d7XC0",
      authDomain: "stock-game-35183.firebaseapp.com",
      projectId: "stock-game-35183",
      storageBucket: "stock-game-35183.firebasestorage.app",
      messagingSenderId: "243838439967",
      appId: "1:243838439967:web:47b378ec6aef87e03f3b2a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    /********************************************************************
     * 2) 기본 설정값
     ********************************************************************/
    const INITIAL_CASH = 1000000;
    const EARN_MIN = 10000;
    const EARN_MAX = 50000;
    const EARN_COOLDOWN_MS = 60 * 1000;

    let currentUser = null;
    let currentUserData = null;
    let cooldownTimer = null;

    /********************************************************************
     * 3) DOM
     ********************************************************************/
    const loading = document.getElementById("loading");
    const loginScreen = document.getElementById("loginScreen");
    const nicknameScreen = document.getElementById("nicknameScreen");
    const gameScreen = document.getElementById("gameScreen");

    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const loginError = document.getElementById("loginError");

    const nicknameInput = document.getElementById("nicknameInput");
    const startBtn = document.getElementById("startBtn");
    const nicknameError = document.getElementById("nicknameError");

    const nicknameLabel = document.getElementById("nicknameLabel");
    const cashLabel = document.getElementById("cashLabel");
    const earnBtn = document.getElementById("earnBtn");
    const menuBtn = document.getElementById("menuBtn");
    const toast = document.getElementById("toast");

    /********************************************************************
     * 4) 화면 전환
     ********************************************************************/
    function showScreen(name) {
      loading.classList.add("hidden");
      loginScreen.classList.add("hidden");
      nicknameScreen.classList.add("hidden");
      gameScreen.style.display = "none";

      if (name === "login") loginScreen.classList.remove("hidden");
      if (name === "nickname") nicknameScreen.classList.remove("hidden");
      if (name === "game") gameScreen.style.display = "block";
    }

    function showToast(message) {
      toast.textContent = message;
      toast.style.display = "block";
      setTimeout(() => {
        toast.style.display = "none";
      }, 1800);
    }

    function formatMoney(value) {
      return Number(value || 0).toLocaleString("ko-KR") + "원";
    }

    function getRandomEarnAmount() {
      return Math.floor(Math.random() * (EARN_MAX - EARN_MIN + 1)) + EARN_MIN;
    }

    function userRef(uid) {
      return doc(db, "users", uid);
    }

    function timestampToMs(value) {
      if (!value) return 0;
      if (typeof value.toMillis === "function") return value.toMillis();
      if (typeof value.seconds === "number") return value.seconds * 1000;
      return 0;
    }

    /********************************************************************
     * 5) 유저 데이터 렌더링
     ********************************************************************/
    function renderUser(data) {
      currentUserData = data;
      nicknameLabel.textContent = data.nickname || "닉네임 없음";
      cashLabel.textContent = formatMoney(data.cash || 0);
      updateEarnButton();
    }

    function updateEarnButton() {
      if (!currentUserData) return;
      if (cooldownTimer) clearInterval(cooldownTimer);

      const tick = () => {
        const lastEarnMs = timestampToMs(currentUserData.lastEarnAt);
        const now = Date.now();
        const remainMs = Math.max(0, EARN_COOLDOWN_MS - (now - lastEarnMs));
        const remainSec = Math.ceil(remainMs / 1000);

        if (!lastEarnMs || remainMs <= 0) {
          earnBtn.disabled = false;
          earnBtn.textContent = "돈벌기";
          if (cooldownTimer) clearInterval(cooldownTimer);
          cooldownTimer = null;
        } else {
          earnBtn.disabled = true;
          earnBtn.textContent = `${remainSec}초`;
        }
      };

      tick();
      cooldownTimer = setInterval(tick, 250);
    }

    /********************************************************************
     * 6) 로그인 상태 확인
     * 모바일 브라우저 안정성을 위해 redirect 로그인 결과도 먼저 확인합니다.
     ********************************************************************/
    getRedirectResult(auth).catch((error) => {
      console.error(error);
      loginError.textContent = "구글 로그인 결과를 확인하지 못했습니다. Firebase Auth 설정을 확인해주세요.";
    });

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      loginError.textContent = "";
      nicknameError.textContent = "";

      if (!user) {
        currentUserData = null;
        showScreen("login");
        return;
      }

      try {
        const ref = userRef(user.uid);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
          showScreen("nickname");
          return;
        }

        const data = snap.data();
        if (!data.nickname) {
          showScreen("nickname");
          return;
        }

        await updateDoc(ref, { lastLoginAt: serverTimestamp() });
        renderUser(data);
        showScreen("game");
      } catch (error) {
        console.error(error);
        loginError.textContent = "유저 정보를 불러오지 못했습니다. Firebase 설정과 규칙을 확인해주세요.";
        showScreen("login");
      }
    });

    /********************************************************************
     * 7) 구글 로그인
     ********************************************************************/
    googleLoginBtn.addEventListener("click", async () => {
      loginError.textContent = "";
      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        console.error(error);
        loginError.textContent = "구글 로그인에 실패했습니다. Firebase Auth 설정과 승인 도메인을 확인해주세요.";
      }
    });

    /********************************************************************
     * 8) 닉네임 입력 + 시작하기
     ********************************************************************/
    nicknameInput.addEventListener("input", () => {
      const nickname = nicknameInput.value.trim();
      startBtn.disabled = nickname.length < 1;
    });

    startBtn.addEventListener("click", async () => {
      if (!currentUser) return;

      const nickname = nicknameInput.value.trim();
      if (!nickname) return;

      nicknameError.textContent = "";
      startBtn.disabled = true;
      startBtn.textContent = "저장 중...";

      try {
        const data = {
          nickname,
          cash: INITIAL_CASH,
          lastEarnAt: null,
          createdAt: serverTimestamp(),
          lastLoginAt: serverTimestamp()
        };

        await setDoc(userRef(currentUser.uid), data);

        currentUserData = {
          nickname,
          cash: INITIAL_CASH,
          lastEarnAt: null
        };

        renderUser(currentUserData);
        showScreen("game");
        showToast("가입 보상 1,000,000원 지급!");
      } catch (error) {
        console.error(error);
        nicknameError.textContent = "닉네임 저장에 실패했습니다. Firestore 규칙을 확인해주세요.";
      } finally {
        startBtn.textContent = "시작하기";
        startBtn.disabled = nicknameInput.value.trim().length < 1;
      }
    });

    /********************************************************************
     * 9) 돈벌기
     ********************************************************************/
    earnBtn.addEventListener("click", async () => {
      if (!currentUser || !currentUserData || earnBtn.disabled) return;

      earnBtn.disabled = true;
      earnBtn.textContent = "처리중";

      try {
        const amount = getRandomEarnAmount();
        const ref = userRef(currentUser.uid);

        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(ref);
          if (!snap.exists()) throw new Error("유저 데이터 없음");

          const data = snap.data();
          const lastEarnMs = timestampToMs(data.lastEarnAt);
          const now = Date.now();

          if (lastEarnMs && now - lastEarnMs < EARN_COOLDOWN_MS) {
            throw new Error("아직 돈벌기 쿨타임입니다.");
          }

          transaction.update(ref, {
            cash: Number(data.cash || 0) + amount,
            lastEarnAt: serverTimestamp()
          });

          currentUserData = {
            ...data,
            cash: Number(data.cash || 0) + amount,
            lastEarnAt: { seconds: Math.floor(Date.now() / 1000) }
          };
        });

        renderUser(currentUserData);
        showToast(`+${formatMoney(amount)} 획득!`);
      } catch (error) {
        console.error(error);
        showToast(error.message || "돈벌기 처리에 실패했습니다.");
        updateEarnButton();
      }
    });

    /********************************************************************
     * 10) 메뉴 버튼 임시 기능
     ********************************************************************/
    menuBtn.addEventListener("click", () => {
      showToast("메뉴는 다음 단계에서 연결할 예정입니다.");
    });
  </script>
</body>
</html>
