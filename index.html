<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주식 게임 v15</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1f2937; color: #fff; }
    :root {
      --app-bg: #1f2937;
      --panel-bg: #1f2937;
      --bottom-bg: #111827;
      --input-bg: #111827;
      --line: rgba(255,255,255,0.14);
      --line-strong: rgba(255,255,255,0.22);
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --green: #22c55e;
      --red: #ef4444;
      --muted: #94a3b8;
      --text-soft: #cbd5e1;
    }
    body { overflow: hidden; }
    .app { height: 100dvh; overflow: hidden; }
    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .app { min-height: 100dvh; display: flex; flex-direction: column; background: var(--app-bg); }
    .screen { flex: 1; min-height: 0; display: none; padding: 24px; align-items: center; justify-content: center; padding-bottom: 96px; }
    .screen.active { display: flex; }
    .card { width: min(420px, 100%); background: var(--panel-bg); border: 1px solid var(--line); padding: 24px; box-shadow: 0 18px 50px rgba(0,0,0,0.28); }
    .title { font-size: 26px; font-weight: 900; text-align: center; margin: 0 0 8px; }
    .subtitle { margin: 0 0 22px; color: var(--text-soft); text-align: center; line-height: 1.5; font-size: 14px; }
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .field label { color: var(--text-soft); font-size: 13px; font-weight: 800; }
    input { width: 100%; height: 48px; border: 1px solid var(--line); background: var(--input-bg); color: #fff; padding: 0 14px; outline: none; border-radius: 0; }
    input:focus { border-color: #60a5fa; }
    .primary-btn { width: 100%; height: 48px; background: var(--blue); color: #fff; font-weight: 900; border-radius: 0; }
    .primary-btn:active { transform: translateY(1px); }
    .ghost-btn { width: 100%; height: 46px; background: var(--panel-bg); color: #fff; border: 1px solid var(--line); font-weight: 800; border-radius: 0; margin-top: 10px; }
    .status { min-height: 22px; color: #93c5fd; font-size: 13px; margin-top: 12px; text-align: center; line-height: 1.5; }
    .error { color: #fca5a5; }
    .success { color: #86efac; }

    .main { width: 100%; max-width: 520px; text-align: center; }
    .main-box h1 { margin: 0 0 10px; font-size: 30px; font-weight: 950; }
    .main-box p { margin: 0; color: var(--text-soft); line-height: 1.65; font-size: 14px; }
    .earned-toast { display: none; }
    .floating-earn-popup {
      position: fixed;
      left: 50%;
      bottom: calc(92px + env(safe-area-inset-bottom));
      transform: translate(-50%, 14px);
      min-width: 176px;
      max-width: calc(100vw - 48px);
      padding: 13px 18px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--line-strong);
      color: #86efac;
      font-size: 15px;
      font-weight: 950;
      text-align: center;
      letter-spacing: -0.2px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.36);
      opacity: 0;
      pointer-events: none;
      z-index: 120;
      transition: opacity 220ms ease, transform 220ms ease;
      white-space: nowrap;
    }
    .floating-earn-popup.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }
    .floating-earn-popup.error {
      color: #fca5a5;
    }

    .bottom-bar { position: fixed; left: 0; right: 0; bottom: 0; height: 72px; padding-bottom: env(safe-area-inset-bottom); background: var(--bottom-bg); border-top: 1px solid var(--line); display: none; grid-template-columns: 58px 1fr 72px; z-index: 50; }
    .bottom-bar.active { display: grid; }
    .bar-btn { height: 72px; background: var(--blue); color: #fff; font-weight: 950; border-radius: 0; }
    .bar-btn.menu { font-size: 25px; }
    .bar-btn.earn { font-size: 13px; padding: 0 4px; }
    .center-info { height: 72px; background: var(--app-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid var(--line); border-right: 1px solid var(--line); min-width: 0; }
    .nickname { font-size: 13px; color: var(--text-soft); font-weight: 800; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cash { font-size: 15px; color: #fff; font-weight: 950; margin-top: 3px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .menu-panel { position: fixed; left: 8px; bottom: calc(80px + env(safe-area-inset-bottom)); width: 132px; background: var(--panel-bg); border: 1px solid var(--line); box-shadow: 0 18px 45px rgba(0,0,0,0.35); display: none; z-index: 80; }
    .menu-panel.active { display: block; }
    .menu-item { width: 100%; height: 48px; background: transparent; color: #fff; text-align: left; padding: 0 16px; font-weight: 900; border-radius: 0; border-bottom: 1px solid var(--line); }
    .menu-item:last-child { border-bottom: 0; }
    .menu-item:active { background: rgba(255,255,255,0.08); }
    .admin-only { display: none; }
    .admin-only.show { display: block; }

    .page-screen {
      align-items: stretch;
      justify-content: flex-start;
      height: calc(100dvh - 72px - env(safe-area-inset-bottom));
      flex: 0 0 calc(100dvh - 72px - env(safe-area-inset-bottom));
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 0 18px calc(132px + env(safe-area-inset-bottom));
    }
    .page { width: 100%; max-width: 640px; margin: 0 auto; padding: 28px 0 44px; }
    .page .title { text-align: left; margin-bottom: 8px; }
    .page .subtitle { text-align: left; margin-bottom: 22px; }
    .settings-section { width: 100%; }
    .settings-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .settings-top .title { margin: 0; }
    .settings-back-btn { width: auto; min-width: 78px; height: 38px; padding: 0 12px; margin: 0; background: var(--panel-bg); color: #fff; border: 1px solid var(--line); font-size: 13px; font-weight: 900; border-radius: 0; }
    .settings-tabs { display: flex; align-items: center; gap: 26px; border-bottom: 1px solid var(--line-strong); margin: 2px 0 22px; }
    .settings-tab { height: 46px; padding: 0; background: transparent; color: var(--muted); font-size: 15px; font-weight: 750; border-radius: 0; }
    .settings-tab.active { color: #fff; font-weight: 950; }
    .settings-panel { display: none; }
    .settings-panel.active { display: block; }
    .settings-row { display: grid; grid-template-columns: 1fr 34px; gap: 8px; align-items: center; }
    .won { color: var(--text-soft); font-size: 13px; font-weight: 900; }
    .hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: -6px; margin-bottom: 18px; }
    .section-title { font-size: 17px; font-weight: 950; margin: 0 0 14px; }

    .market-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 10px; margin-bottom: 12px; }
    .market-note { font-size: 12px; color: var(--muted); line-height: 1.45; margin-bottom: 10px; }
    .stock-list { border-top: 1px solid var(--line-strong); }
    .stock-list-head { display: grid; grid-template-columns: minmax(72px, 0.82fr) minmax(84px, 1.05fr) minmax(74px, 0.78fr) minmax(66px, 0.72fr); gap: 8px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 11px; font-weight: 950; letter-spacing: -0.2px; }
    .stock-list-head .head-price, .stock-list-head .head-change { text-align: right; }
    .stock-row { border-bottom: 1px solid var(--line-strong); padding: 0; cursor: pointer; user-select: none; }
    .stock-summary { display: grid; grid-template-columns: minmax(72px, 0.82fr) minmax(84px, 1.05fr) minmax(74px, 0.78fr) minmax(66px, 0.72fr); gap: 8px; align-items: center; min-height: 78px; padding: 12px 0; }
    .stock-left { min-width: 0; }
    .stock-name { font-size: 16px; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.4px; }
    .mini-wrap { height: 34px; width: 100%; display: flex; align-items: center; }
    .mini-chart { width: 100%; height: 34px; display: block; }
    .stock-price-col, .stock-change-col { text-align: right; min-width: 0; }
    .price { font-size: 17px; font-weight: 950; white-space: nowrap; letter-spacing: -0.6px; }
    .change-money { font-size: 13px; font-weight: 950; line-height: 1.2; white-space: nowrap; }
    .change-rate { font-size: 12px; font-weight: 900; margin-top: 2px; line-height: 1.2; white-space: nowrap; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .flat { color: var(--text-soft); }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; line-height: 1.6; }
    .stock-detail { padding: 12px 0 18px; border-top: 1px solid var(--line); }
    .candle-label { color: var(--text-soft); font-size: 12px; font-weight: 900; margin-bottom: 8px; }
    .candle-chart { width: 100%; height: 132px; display: block; background: rgba(17,24,39,0.38); border: 1px solid var(--line); border-radius: 10px; }
    .trade-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .buy-btn, .sell-btn { height: 44px; color: #fff; font-weight: 950; border-radius: 0; }
    .buy-btn { background: var(--green); }
    .sell-btn { background: var(--red); }
    @media (max-width: 360px) {
      .stock-list-head, .stock-summary { grid-template-columns: minmax(66px, 0.75fr) minmax(70px, 0.85fr) minmax(70px, 0.78fr) minmax(60px, 0.68fr); gap: 6px; }
      .price { font-size: 15px; }
      .change-money { font-size: 12px; }
      .change-rate { font-size: 11px; }
      .stock-name { font-size: 15px; }
      .mini-wrap, .mini-chart { height: 30px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="loadingScreen" class="screen active">
      <div class="card">
        <h1 class="title">주식 게임</h1>
        <p class="subtitle">불러오는 중...</p>
      </div>
    </section>

    <section id="loginScreen" class="screen">
      <div class="card">
        <h1 class="title">주식 게임</h1>
        <p class="subtitle">구글 로그인 후 게임을 시작할 수 있어요.</p>
        <button id="googleLoginBtn" class="primary-btn">Google 로그인</button>
        <div id="loginStatus" class="status"></div>
      </div>
    </section>

    <section id="nicknameScreen" class="screen">
      <div class="card">
        <h1 class="title">닉네임 설정</h1>
        <p class="subtitle">처음 가입하면 현재 설정된 가입 보상이 지급됩니다.</p>
        <div class="field">
          <label for="nicknameInput">닉네임</label>
          <input id="nicknameInput" type="text" maxlength="12" placeholder="닉네임 입력" autocomplete="off" />
        </div>
        <button id="startBtn" class="primary-btn" disabled>시작하기</button>
        <div id="nicknameStatus" class="status"></div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="main">
        <div class="main-box">
          <h1>주식 게임</h1>
          <p>아래 돈벌기 버튼을 눌러 현금을 모아보세요.<br />돈벌기는 60초마다 한 번씩 가능합니다.</p>
          <div id="earnedToast" class="earned-toast"></div>
        </div>
      </div>
    </section>

    <section id="marketScreen" class="screen page-screen">
      <div class="page">
        <div class="market-head">
          <div>
            <h1 class="title">시세</h1>
            <p class="subtitle">종목별 현재가와 최근 30분 흐름입니다.</p>
          </div>
        </div>
        <div class="market-note">종목을 누르면 최근 15개 캔들과 매수/매도 버튼이 열립니다.</div>
        <div id="stockList" class="stock-list"></div>
      </div>
    </section>

    <section id="settingsScreen" class="screen page-screen">
      <div class="page">
        <div class="settings-top">
          <h1 class="title">설정</h1>
          <button id="backToGameBtn" class="settings-back-btn">뒤로가기</button>
        </div>
        <p class="subtitle">관리자만 수정할 수 있는 게임 설정입니다.</p>

        <div class="settings-tabs">
          <button id="settingsDefaultTab" class="settings-tab active" type="button">게임 기본값</button>
          <button id="settingsStockTab" class="settings-tab" type="button">종목 추가</button>
        </div>

        <div class="settings-section">
          <div id="settingsDefaultPanel" class="settings-panel active">
            <div class="field">
              <label for="signupBonusInput">신규 가입 지급 금액</label>
              <div class="settings-row">
                <input id="signupBonusInput" type="number" inputmode="numeric" min="1" step="1" />
                <div class="won">원</div>
              </div>
            </div>

            <div class="field">
              <label for="earnMinInput">돈벌기 최소 지급 금액</label>
              <div class="settings-row">
                <input id="earnMinInput" type="number" inputmode="numeric" min="1" step="1" />
                <div class="won">원</div>
              </div>
            </div>

            <div class="field">
              <label for="earnMaxInput">돈벌기 최대 지급 금액</label>
              <div class="settings-row">
                <input id="earnMaxInput" type="number" inputmode="numeric" min="1" step="1" />
                <div class="won">원</div>
              </div>
            </div>

            <div class="hint">기본값: 신규 가입 1,000,000원 / 돈벌기 10,000원~50,000원</div>
            <button id="saveSettingsBtn" class="primary-btn">저장하기</button>
            <div id="settingsStatus" class="status"></div>
          </div>

          <div id="settingsStockPanel" class="settings-panel">
            <div class="field">
              <label for="stockNameInput">종목명</label>
              <input id="stockNameInput" type="text" maxlength="18" placeholder="예: 대한금융" autocomplete="off" />
            </div>
            <div class="field">
              <label for="stockStartPriceInput">시작가</label>
              <div class="settings-row">
                <input id="stockStartPriceInput" type="number" inputmode="numeric" min="1" step="1" placeholder="예: 10000" />
                <div class="won">원</div>
              </div>
            </div>
            <button id="addStockBtn" class="primary-btn">종목 추가하기</button>
            <div id="stockAddStatus" class="status"></div>
          </div>
        </div>
      </div>
    </section>

    <div id="adminMenuPanel" class="menu-panel">
      <button id="openMarketBtn" class="menu-item">시세</button>
      <button id="openSettingsBtn" class="menu-item admin-only">설정</button>
    </div>

    <div id="floatingEarnPopup" class="floating-earn-popup"></div>

    <footer id="bottomBar" class="bottom-bar">
      <button id="menuBtn" class="bar-btn menu">☰</button>
      <div class="center-info">
        <div id="barNickname" class="nickname">-</div>
        <div id="barCash" class="cash">0원</div>
      </div>
      <button id="earnBtn" class="bar-btn earn">돈벌기</button>
    </footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      collection,
      query,
      orderBy,
      limit,
      getDoc,
      getDocs,
      setDoc,
      updateDoc,
      deleteDoc,
      onSnapshot,
      runTransaction,
      serverTimestamp,
      Timestamp,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOWdfAtywZ9UWEcFcsr0N5KI3D66d7XC0",
      authDomain: "stock-game-35183.firebaseapp.com",
      projectId: "stock-game-35183",
      storageBucket: "stock-game-35183.firebasestorage.app",
      messagingSenderId: "243838439967",
      appId: "1:243838439967:web:47b378ec6aef87e03f3b2a"
    };

    const ADMIN_EMAIL = "khu9918@gmail.com";
    const DEFAULT_SETTINGS = { signupBonus: 1000000, earnMin: 10000, earnMax: 50000 };
    const EARN_COOLDOWN_SECONDS = 60;
    const PRICE_HISTORY_LIMIT = 30;
    const CANDLE_COUNT = 15;
    const PRICE_MOVE_RATE = 0.02;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    const screens = {
      loading: document.getElementById("loadingScreen"),
      login: document.getElementById("loginScreen"),
      nickname: document.getElementById("nicknameScreen"),
      game: document.getElementById("gameScreen"),
      market: document.getElementById("marketScreen"),
      settings: document.getElementById("settingsScreen")
    };

    const bottomBar = document.getElementById("bottomBar");
    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const loginStatus = document.getElementById("loginStatus");
    const nicknameInput = document.getElementById("nicknameInput");
    const startBtn = document.getElementById("startBtn");
    const nicknameStatus = document.getElementById("nicknameStatus");
    const barNickname = document.getElementById("barNickname");
    const barCash = document.getElementById("barCash");
    const earnBtn = document.getElementById("earnBtn");
    const earnedToast = document.getElementById("earnedToast");
    const floatingEarnPopup = document.getElementById("floatingEarnPopup");
    const menuBtn = document.getElementById("menuBtn");
    const adminMenuPanel = document.getElementById("adminMenuPanel");
    const openMarketBtn = document.getElementById("openMarketBtn");
    const openSettingsBtn = document.getElementById("openSettingsBtn");
    const signupBonusInput = document.getElementById("signupBonusInput");
    const earnMinInput = document.getElementById("earnMinInput");
    const earnMaxInput = document.getElementById("earnMaxInput");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const backToGameBtn = document.getElementById("backToGameBtn");
    const settingsDefaultTab = document.getElementById("settingsDefaultTab");
    const settingsStockTab = document.getElementById("settingsStockTab");
    const settingsDefaultPanel = document.getElementById("settingsDefaultPanel");
    const settingsStockPanel = document.getElementById("settingsStockPanel");
    const settingsStatus = document.getElementById("settingsStatus");
    const stockNameInput = document.getElementById("stockNameInput");
    const stockStartPriceInput = document.getElementById("stockStartPriceInput");
    const addStockBtn = document.getElementById("addStockBtn");
    const stockAddStatus = document.getElementById("stockAddStatus");
    const stockList = document.getElementById("stockList");

    let currentUser = null;
    let currentUserData = null;
    let currentSettings = { ...DEFAULT_SETTINGS };
    let currentScreenName = "loading";
    let unsubscribeUser = null;
    let unsubscribeSettings = null;
    let unsubscribeStocks = null;
    let priceUnsubs = new Map();
    let cooldownTimer = null;
    let earnPopupTimer = null;
    let marketTimer = null;
    let stocks = [];
    let priceHistories = new Map();
    let expandedStockId = null;
    let marketUpdating = false;

    function isAdmin() { return currentUser && currentUser.email === ADMIN_EMAIL; }
    function activeMainScreens() { return ["game", "market", "settings"]; }

    function showScreen(name) {
      currentScreenName = name;
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
      bottomBar.classList.toggle("active", activeMainScreens().includes(name));
      closeAdminMenu();
      if (name === "market") renderStocks();
    }

    function formatWon(value) {
      const safe = Number(value || 0);
      return safe.toLocaleString("ko-KR") + "원";
    }
    function setStatus(el, text, type = "") {
      el.textContent = text || "";
      el.className = "status" + (type ? " " + type : "");
    }
    function showEarnPopup(text, type = "success") {
      if (!floatingEarnPopup) return;
      if (earnPopupTimer) clearTimeout(earnPopupTimer);
      floatingEarnPopup.textContent = text;
      floatingEarnPopup.className = "floating-earn-popup" + (type === "error" ? " error" : "") + " show";
      earnPopupTimer = setTimeout(() => {
        floatingEarnPopup.classList.remove("show");
        earnPopupTimer = null;
      }, 1800);
    }
    function setSettingsTab(tab) {
      const isStock = tab === "stock";
      settingsDefaultTab.classList.toggle("active", !isStock);
      settingsStockTab.classList.toggle("active", isStock);
      settingsDefaultPanel.classList.toggle("active", !isStock);
      settingsStockPanel.classList.toggle("active", isStock);
      setStatus(settingsStatus, "");
      setStatus(stockAddStatus, "");
    }
    function settingsRef() { return doc(db, "settings", "game"); }
    function userRef(uid) { return doc(db, "users", uid); }
    function stocksCol() { return collection(db, "stocks"); }
    function stockRef(id) { return doc(db, "stocks", id); }
    function pricesCol(stockId) { return collection(db, "stocks", stockId, "prices"); }
    function priceRef(stockId, minuteKey) { return doc(db, "stocks", stockId, "prices", minuteKey); }

    function minuteKey(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const h = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      return `${y}${m}${d}${h}${min}`;
    }
    function msUntilNextMinute() {
      const now = new Date();
      return (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
    }
    function getDirectionClass(value) {
      if (value > 0) return "up";
      if (value < 0) return "down";
      return "flat";
    }
    function getDirectionColor(value) {
      if (value > 0) return getCss("--green");
      if (value < 0) return getCss("--red");
      return getCss("--muted");
    }
    function getCss(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    async function ensureSettingsDocForAdmin() {
      const ref = settingsRef();
      const snap = await getDoc(ref);
      if (!snap.exists() && isAdmin()) {
        await setDoc(ref, { ...DEFAULT_SETTINGS, updatedAt: serverTimestamp(), updatedBy: currentUser.uid });
      }
    }

    function listenSettings() {
      if (unsubscribeSettings) unsubscribeSettings();
      unsubscribeSettings = onSnapshot(settingsRef(), (snap) => {
        if (snap.exists()) {
          const data = snap.data();
          currentSettings = {
            signupBonus: Number(data.signupBonus ?? DEFAULT_SETTINGS.signupBonus),
            earnMin: Number(data.earnMin ?? DEFAULT_SETTINGS.earnMin),
            earnMax: Number(data.earnMax ?? DEFAULT_SETTINGS.earnMax)
          };
        } else currentSettings = { ...DEFAULT_SETTINGS };
        fillSettingsInputs();
      });
    }

    function fillSettingsInputs() {
      signupBonusInput.value = currentSettings.signupBonus;
      earnMinInput.value = currentSettings.earnMin;
      earnMaxInput.value = currentSettings.earnMax;
    }

    function listenUser(uid) {
      if (unsubscribeUser) unsubscribeUser();
      unsubscribeUser = onSnapshot(userRef(uid), (snap) => {
        if (!snap.exists()) {
          currentUserData = null;
          showScreen("nickname");
          return;
        }
        currentUserData = snap.data();
        renderUserBar();
        if (!activeMainScreens().includes(currentScreenName)) showScreen("game");
        updateEarnButton();
      });
    }

    function renderUserBar() {
      if (!currentUserData) return;
      barNickname.textContent = currentUserData.nickname || "-";
      barCash.textContent = formatWon(currentUserData.cash || 0);
    }

    function getLastEarnDate() {
      const lastEarnAt = currentUserData?.lastEarnAt;
      if (!lastEarnAt) return null;
      if (lastEarnAt instanceof Timestamp) return lastEarnAt.toDate();
      if (lastEarnAt.toDate) return lastEarnAt.toDate();
      return null;
    }
    function getCooldownLeft() {
      const lastDate = getLastEarnDate();
      if (!lastDate) return 0;
      const passed = Math.floor((Date.now() - lastDate.getTime()) / 1000);
      return Math.max(0, EARN_COOLDOWN_SECONDS - passed);
    }
    function updateEarnButton() {
      if (cooldownTimer) clearInterval(cooldownTimer);
      const tick = () => {
        const left = getCooldownLeft();
        if (left > 0) { earnBtn.disabled = true; earnBtn.textContent = `${left}초`; }
        else {
          earnBtn.disabled = false; earnBtn.textContent = "돈벌기";
          if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; }
        }
      };
      tick();
      cooldownTimer = setInterval(tick, 1000);
    }
    function randomEarnAmount(min, max) {
      const safeMin = Math.max(1, Math.floor(Number(min || DEFAULT_SETTINGS.earnMin)));
      const safeMax = Math.max(safeMin, Math.floor(Number(max || DEFAULT_SETTINGS.earnMax)));
      return Math.floor(Math.random() * (safeMax - safeMin + 1)) + safeMin;
    }

    async function handleEarn() {
      if (!currentUser || !currentUserData) return;
      const left = getCooldownLeft();
      if (left > 0) { updateEarnButton(); return; }
      const amount = randomEarnAmount(currentSettings.earnMin, currentSettings.earnMax);
      earnBtn.disabled = true; earnBtn.textContent = "처리중";
      try {
        await runTransaction(db, async (transaction) => {
          const ref = userRef(currentUser.uid);
          const snap = await transaction.get(ref);
          if (!snap.exists()) throw new Error("유저 데이터가 없습니다.");
          const data = snap.data();
          const lastEarnAt = data.lastEarnAt?.toDate ? data.lastEarnAt.toDate() : null;
          if (lastEarnAt) {
            const passed = Math.floor((Date.now() - lastEarnAt.getTime()) / 1000);
            if (passed < EARN_COOLDOWN_SECONDS) throw new Error("아직 돈벌기 시간이 남았습니다.");
          }
          transaction.update(ref, { cash: Number(data.cash || 0) + amount, lastEarnAt: serverTimestamp() });
        });
        if (earnedToast) earnedToast.textContent = "";
        showEarnPopup(`+${formatWon(amount)} 획득`);
      } catch (error) {
        const message = error.message || "돈벌기에 실패했습니다.";
        if (earnedToast) earnedToast.textContent = "";
        showEarnPopup(message, "error");
      } finally { updateEarnButton(); }
    }

    function toggleAdminMenu(event) {
      event.stopPropagation();
      openSettingsBtn.classList.toggle("show", !!isAdmin());
      adminMenuPanel.classList.toggle("active");
    }
    function closeAdminMenu() { adminMenuPanel.classList.remove("active"); }

    async function createNewUser() {
      const nickname = nicknameInput.value.trim();
      if (!nickname) return;
      startBtn.disabled = true;
      setStatus(nicknameStatus, "저장 중...");
      try {
        await setDoc(userRef(currentUser.uid), {
          nickname,
          cash: Number(currentSettings.signupBonus || DEFAULT_SETTINGS.signupBonus),
          lastEarnAt: null,
          createdAt: serverTimestamp(),
          lastLoginAt: serverTimestamp()
        });
        setStatus(nicknameStatus, "시작합니다!", "success");
      } catch (error) {
        setStatus(nicknameStatus, "닉네임 저장에 실패했습니다. Firestore 규칙과 설정값을 확인해주세요.", "error");
        startBtn.disabled = false;
      }
    }

    async function saveSettings() {
      if (!isAdmin()) return;
      const signupBonus = Number(signupBonusInput.value);
      const earnMin = Number(earnMinInput.value);
      const earnMax = Number(earnMaxInput.value);
      if (!Number.isFinite(signupBonus) || signupBonus <= 0) { setStatus(settingsStatus, "신규 가입 지급 금액은 0보다 커야 합니다.", "error"); return; }
      if (!Number.isFinite(earnMin) || earnMin <= 0) { setStatus(settingsStatus, "돈벌기 최소 지급 금액은 0보다 커야 합니다.", "error"); return; }
      if (!Number.isFinite(earnMax) || earnMax < earnMin) { setStatus(settingsStatus, "돈벌기 최대 지급 금액은 최소 지급 금액보다 크거나 같아야 합니다.", "error"); return; }
      saveSettingsBtn.disabled = true;
      setStatus(settingsStatus, "저장 중...");
      try {
        await setDoc(settingsRef(), { signupBonus, earnMin, earnMax, updatedAt: serverTimestamp(), updatedBy: currentUser.uid }, { merge: true });
        setStatus(settingsStatus, "설정이 저장되었습니다.", "success");
      } catch (error) { setStatus(settingsStatus, "설정 저장에 실패했습니다. 관리자 권한을 확인해주세요.", "error"); }
      finally { saveSettingsBtn.disabled = false; }
    }

    async function addStock() {
      if (!isAdmin()) return;
      const name = stockNameInput.value.trim();
      const startPrice = Math.floor(Number(stockStartPriceInput.value));
      if (!name) { setStatus(stockAddStatus, "종목명을 입력해주세요.", "error"); return; }
      if (!Number.isFinite(startPrice) || startPrice <= 0) { setStatus(stockAddStatus, "시작가는 0보다 커야 합니다.", "error"); return; }
      addStockBtn.disabled = true;
      setStatus(stockAddStatus, "종목 추가 중...");
      try {
        const newRef = doc(stocksCol());
        const key = minuteKey();
        const batch = writeBatch(db);
        batch.set(newRef, {
          name,
          startPrice,
          currentPrice: startPrice,
          previousPrice: startPrice,
          lastMinuteKey: key,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          createdBy: currentUser.uid
        });
        batch.set(priceRef(newRef.id, key), {
          price: startPrice,
          minuteKey: key,
          createdAt: serverTimestamp()
        });
        await batch.commit();
        stockNameInput.value = "";
        stockStartPriceInput.value = "";
        setStatus(stockAddStatus, "종목이 추가되었습니다.", "success");
      } catch (error) { setStatus(stockAddStatus, "종목 추가에 실패했습니다. Firebase 규칙을 확인해주세요.", "error"); }
      finally { addStockBtn.disabled = false; }
    }

    function listenStocks() {
      if (unsubscribeStocks) unsubscribeStocks();
      unsubscribeStocks = onSnapshot(query(stocksCol(), orderBy("createdAt", "asc")), (snap) => {
        stocks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        syncPriceListeners();
        renderStocks();
      });
    }

    function syncPriceListeners() {
      const activeIds = new Set(stocks.map(s => s.id));
      for (const [id, unsub] of priceUnsubs.entries()) {
        if (!activeIds.has(id)) { unsub(); priceUnsubs.delete(id); priceHistories.delete(id); }
      }
      for (const stock of stocks) {
        if (priceUnsubs.has(stock.id)) continue;
        const q = query(pricesCol(stock.id), orderBy("createdAt", "desc"), limit(PRICE_HISTORY_LIMIT));
        const unsub = onSnapshot(q, (snap) => {
          const history = snap.docs.map(d => ({ id: d.id, ...d.data() })).reverse();
          priceHistories.set(stock.id, history);
          renderStocks();
        });
        priceUnsubs.set(stock.id, unsub);
      }
    }

    function renderStocks() {
      if (!stockList) return;
      if (!stocks.length) {
        stockList.innerHTML = `<div class="empty">등록된 종목이 없습니다.<br />관리자 설정에서 종목을 추가해주세요.</div>`;
        return;
      }
      stockList.innerHTML = `
        <div class="stock-list-head">
          <div>종목명</div>
          <div>그래프</div>
          <div class="head-price">현재가</div>
          <div class="head-change">등락</div>
        </div>
      `;
      for (const stock of stocks) {
        const history = priceHistories.get(stock.id) || [];
        const current = Number(stock.currentPrice || stock.startPrice || 0);
        const previous = Number(stock.previousPrice || current);
        const change = current - previous;
        const rate = previous > 0 ? (change / previous) * 100 : 0;
        const directionClass = getDirectionClass(change);
        const row = document.createElement("div");
        row.className = "stock-row";
        row.dataset.stockId = stock.id;
        row.innerHTML = `
          <div class="stock-summary">
            <div class="stock-left">
              <div class="stock-name">${escapeHtml(stock.name || "이름 없음")}</div>
            </div>
            <div class="mini-wrap"><canvas class="mini-chart" width="180" height="46"></canvas></div>
            <div class="stock-price-col">
              <div class="price ${directionClass}">${formatWon(current)}</div>
            </div>
            <div class="stock-change-col">
              <div class="change-money ${directionClass}">${change > 0 ? "▲" : change < 0 ? "▼" : "-"} ${formatWon(Math.abs(change))}</div>
              <div class="change-rate ${directionClass}">${change > 0 ? "+" : change < 0 ? "-" : ""}${Math.abs(rate).toFixed(2)}%</div>
            </div>
          </div>
          ${expandedStockId === stock.id ? `
            <div class="stock-detail">
              <div class="candle-label">최근 15개 캔들</div>
              <canvas class="candle-chart" width="600" height="150"></canvas>
              <div class="trade-buttons">
                <button class="buy-btn" type="button">매수</button>
                <button class="sell-btn" type="button">매도</button>
              </div>
            </div>
          ` : ""}
        `;
        row.addEventListener("click", () => {
          expandedStockId = expandedStockId === stock.id ? null : stock.id;
          renderStocks();
        });
        row.querySelectorAll("button").forEach(btn => btn.addEventListener("click", (e) => e.stopPropagation()));
        stockList.appendChild(row);
        drawMiniChart(row.querySelector(".mini-chart"), history, current, change);
        if (expandedStockId === stock.id) drawCandleChart(row.querySelector(".candle-chart"), history);
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
    }

    function drawMiniChart(canvas, history, fallbackPrice, directionValue = 0) {
      if (!canvas) return;
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      const w = rect.width, h = rect.height;
      ctx.clearRect(0, 0, w, h);
      const points = history.map(p => Number(p.price)).filter(n => Number.isFinite(n));
      if (!points.length && fallbackPrice) points.push(Number(fallbackPrice));
      const midY = h / 2;
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(w, midY); ctx.stroke();
      if (points.length < 2) {
        ctx.strokeStyle = getCss("--muted"); ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(w, midY); ctx.stroke(); return;
      }
      const min = Math.min(...points), max = Math.max(...points);
      const range = Math.max(1, max - min);
      const color = getDirectionColor(directionValue);
      ctx.strokeStyle = color; ctx.lineWidth = 2.35; ctx.lineJoin = "round"; ctx.lineCap = "round";
      ctx.beginPath();
      points.forEach((price, i) => {
        const x = points.length === 1 ? w : (i / (points.length - 1)) * w;
        const y = h - ((price - min) / range) * (h - 8) - 4;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function makeCandles(history) {
      const prices = history.map(p => Number(p.price)).filter(n => Number.isFinite(n));
      const start = Math.max(1, prices.length - CANDLE_COUNT);
      const candles = [];
      for (let i = start; i < prices.length; i++) {
        const open = prices[i - 1];
        const close = prices[i];
        candles.push({ open, close, high: Math.max(open, close), low: Math.min(open, close) });
      }
      return candles;
    }

    function drawCandleChart(canvas, history) {
      if (!canvas) return;
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      const w = rect.width, h = rect.height;
      ctx.clearRect(0, 0, w, h);
      const candles = makeCandles(history);
      const padX = 12;
      const padY = 12;
      ctx.strokeStyle = "rgba(255,255,255,0.075)"; ctx.lineWidth = 1;
      for (let i = 1; i < 4; i++) {
        const y = padY + ((h - padY * 2) / 4) * i;
        ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(w - padX, y); ctx.stroke();
      }
      if (!candles.length) {
        ctx.fillStyle = getCss("--muted"); ctx.font = "12px system-ui"; ctx.textAlign = "center";
        ctx.fillText("가격 기록이 쌓이면 캔들이 표시됩니다.", w / 2, h / 2); return;
      }
      const lows = candles.map(c => c.low), highs = candles.map(c => c.high);
      const min = Math.min(...lows), max = Math.max(...highs), range = Math.max(1, max - min);
      const chartW = w - padX * 2;
      const chartH = h - padY * 2;
      const slot = chartW / CANDLE_COUNT;
      const bodyW = Math.max(4, Math.min(12, slot * 0.42));
      const toY = (price) => padY + chartH - ((price - min) / range) * chartH;
      const offset = CANDLE_COUNT - candles.length;
      candles.forEach((c, idx) => {
        const x = padX + (idx + offset + 0.5) * slot;
        const openY = toY(c.open), closeY = toY(c.close), highY = toY(c.high), lowY = toY(c.low);
        const diff = c.close - c.open;
        const color = getDirectionColor(diff);
        ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1.7;
        ctx.beginPath(); ctx.moveTo(x, highY); ctx.lineTo(x, lowY); ctx.stroke();
        const top = Math.min(openY, closeY);
        const bodyH = Math.max(2.5, Math.abs(closeY - openY));
        ctx.fillRect(x - bodyW / 2, top, bodyW, bodyH);
      });
    }

    async function updateMarketPrices() {
      if (!currentUser || marketUpdating || !stocks.length) return;
      marketUpdating = true;
      const key = minuteKey();
      try {
        for (const stock of stocks) {
          await runTransaction(db, async (transaction) => {
            const ref = stockRef(stock.id);
            const snap = await transaction.get(ref);
            if (!snap.exists()) return;
            const data = snap.data();
            if (data.lastMinuteKey === key) return;
            const current = Math.max(1, Number(data.currentPrice || data.startPrice || 1));
            const randomRate = (Math.random() * PRICE_MOVE_RATE * 2) - PRICE_MOVE_RATE;
            const next = Math.max(1, Math.round(current * (1 + randomRate)));
            transaction.update(ref, {
              previousPrice: current,
              currentPrice: next,
              lastMinuteKey: key,
              updatedAt: serverTimestamp()
            });
            transaction.set(priceRef(stock.id, key), { price: next, minuteKey: key, createdAt: serverTimestamp() });
          }).catch(() => {});
          cleanupOldPrices(stock.id).catch(() => {});
        }
      } finally { marketUpdating = false; }
    }

    async function cleanupOldPrices(stockId) {
      const all = await getDocs(query(pricesCol(stockId), orderBy("createdAt", "desc"), limit(PRICE_HISTORY_LIMIT + 12)));
      const docs = all.docs;
      if (docs.length <= PRICE_HISTORY_LIMIT) return;
      const batch = writeBatch(db);
      docs.slice(PRICE_HISTORY_LIMIT).forEach(d => batch.delete(d.ref));
      await batch.commit();
    }

    function startMarketTimer() {
      if (marketTimer) clearTimeout(marketTimer);
      const run = async () => {
        await updateMarketPrices();
        marketTimer = setTimeout(run, msUntilNextMinute() || 60000);
      };
      marketTimer = setTimeout(run, msUntilNextMinute());
    }
    function stopMarketTimer() { if (marketTimer) { clearTimeout(marketTimer); marketTimer = null; } }

    googleLoginBtn.addEventListener("click", async () => {
      setStatus(loginStatus, "구글 로그인으로 이동합니다...");
      try { await signInWithRedirect(auth, provider); }
      catch (error) { setStatus(loginStatus, "로그인에 실패했습니다.", "error"); }
    });
    nicknameInput.addEventListener("input", () => { startBtn.disabled = nicknameInput.value.trim().length === 0; });
    startBtn.addEventListener("click", createNewUser);
    earnBtn.addEventListener("click", handleEarn);
    menuBtn.addEventListener("click", toggleAdminMenu);
    adminMenuPanel.addEventListener("click", (event) => event.stopPropagation());
    document.addEventListener("click", () => closeAdminMenu());
    openMarketBtn.addEventListener("click", () => { closeAdminMenu(); showScreen("market"); });
    openSettingsBtn.addEventListener("click", () => { closeAdminMenu(); fillSettingsInputs(); setSettingsTab("default"); showScreen("settings"); });
    settingsDefaultTab.addEventListener("click", () => setSettingsTab("default"));
    settingsStockTab.addEventListener("click", () => setSettingsTab("stock"));
    saveSettingsBtn.addEventListener("click", saveSettings);
    addStockBtn.addEventListener("click", addStock);
    backToGameBtn.addEventListener("click", () => showScreen("game"));
    window.addEventListener("resize", () => renderStocks());

    getRedirectResult(auth).catch(() => {});

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (!user) {
        currentUserData = null;
        if (unsubscribeUser) unsubscribeUser();
        if (unsubscribeSettings) unsubscribeSettings();
        if (unsubscribeStocks) unsubscribeStocks();
        for (const unsub of priceUnsubs.values()) unsub();
        priceUnsubs.clear(); priceHistories.clear(); stocks = [];
        stopMarketTimer();
        showScreen("login");
        return;
      }
      try {
        await ensureSettingsDocForAdmin();
        listenSettings();
        listenStocks();
        startMarketTimer();
        await updateDoc(userRef(user.uid), { lastLoginAt: serverTimestamp() }).catch(() => {});
        const snap = await getDoc(userRef(user.uid));
        if (snap.exists()) listenUser(user.uid);
        else { currentUserData = null; showScreen("nickname"); }
      } catch (error) {
        setStatus(loginStatus, "데이터를 불러오지 못했습니다. Firebase 규칙을 확인해주세요.", "error");
        showScreen("login");
      }
    });
  </script>
