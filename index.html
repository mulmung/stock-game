<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주식 게임 v7</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1f2937; color: #fff; }
    :root {
      --app-bg: #1f2937;
      --panel-bg: #1f2937;
      --bottom-bg: #111827;
      --input-bg: #111827;
      --line: rgba(255,255,255,0.14);
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
    }
    body { overflow: hidden; }
    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .app { min-height: 100dvh; display: flex; flex-direction: column; background: var(--app-bg); }
    .screen { flex: 1; display: none; padding: 24px; align-items: center; justify-content: center; padding-bottom: 96px; }
    .screen.active { display: flex; }
    .card { width: min(420px, 100%); background: var(--panel-bg); border: 1px solid var(--line); padding: 24px; box-shadow: 0 18px 50px rgba(0,0,0,0.28); }
    .title { font-size: 26px; font-weight: 900; text-align: center; margin: 0 0 8px; }
    .subtitle { margin: 0 0 22px; color: #cbd5e1; text-align: center; line-height: 1.5; font-size: 14px; }
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .field label { color: #cbd5e1; font-size: 13px; font-weight: 800; }
    input { width: 100%; height: 48px; border: 1px solid var(--line); background: var(--input-bg); color: #fff; padding: 0 14px; outline: none; border-radius: 0; }
    input:focus { border-color: #60a5fa; }
    .primary-btn { width: 100%; height: 48px; background: var(--blue); color: #fff; font-weight: 900; border-radius: 0; }
    .primary-btn:active { transform: translateY(1px); }
    .ghost-btn { width: 100%; height: 46px; background: var(--panel-bg); color: #fff; border: 1px solid var(--line); font-weight: 800; border-radius: 0; margin-top: 10px; }
    .status { min-height: 22px; color: #93c5fd; font-size: 13px; margin-top: 12px; text-align: center; line-height: 1.5; }
    .error { color: #fca5a5; }
    .success { color: #86efac; }

    .main { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; }
    .main-box { width: min(520px, 100%); padding: 24px; }
    .main-box h1 { margin: 0 0 10px; font-size: 28px; }
    .main-box p { margin: 0; color: #cbd5e1; line-height: 1.6; }
    .earned-toast { margin-top: 18px; min-height: 28px; color: #86efac; font-weight: 900; }

    .bottom-bar { position: fixed; left: 0; right: 0; bottom: 0; height: 72px; padding-bottom: env(safe-area-inset-bottom); background: var(--bottom-bg); border-top: 1px solid var(--line); display: none; grid-template-columns: 58px 1fr 72px; z-index: 50; }
    .bottom-bar.active { display: grid; }
    .bar-btn { height: 72px; background: var(--blue-dark); color: #fff; font-weight: 900; border-radius: 0; border-right: 1px solid var(--line); white-space: nowrap; }
    .bar-btn:last-child { border-right: 0; border-left: 1px solid var(--line); }
    .bar-btn.menu { font-size: 25px; }
    .bar-btn.earn { font-size: 13px; padding: 0 4px; }
    .center-info { min-width: 0; height: 72px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 0 8px; background: var(--panel-bg); }
    .nickname { font-size: 14px; color: #bfdbfe; font-weight: 900; max-width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .cash { font-size: 18px; font-weight: 950; max-width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    .menu-panel { position: fixed; left: 8px; bottom: calc(80px + env(safe-area-inset-bottom)); width: 132px; background: var(--panel-bg); border: 1px solid var(--line); box-shadow: 0 18px 45px rgba(0,0,0,0.35); display: none; z-index: 80; }
    .menu-panel.active { display: block; }
    .menu-item { width: 100%; height: 48px; background: transparent; color: #fff; text-align: left; padding: 0 16px; font-weight: 900; border-radius: 0; }
    .menu-item:active { background: rgba(255,255,255,0.08); }

    .settings-screen { align-items: stretch; justify-content: flex-start; overflow-y: auto; padding: 0 24px 96px; }
    .settings-page { width: 100%; max-width: 520px; margin: 0 auto; padding: 28px 0 26px; }
    .settings-page .title { text-align: left; margin-bottom: 8px; }
    .settings-page .subtitle { text-align: left; margin-bottom: 26px; }
    .settings-section { width: 100%; }
    .settings-row { display: grid; grid-template-columns: 1fr 34px; gap: 8px; align-items: center; }
    .won { color: #cbd5e1; font-weight: 800; }
    .hint { font-size: 12px; color: #94a3b8; line-height: 1.5; margin-top: -6px; margin-bottom: 18px; }
    .settings-divider { height: 1px; background: var(--line); margin: 22px 0; }

    .loading { color: #cbd5e1; text-align: center; }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <section id="loadingScreen" class="screen active">
      <div class="loading">불러오는 중...</div>
    </section>

    <section id="loginScreen" class="screen">
      <div class="card">
        <h1 class="title">주식 게임</h1>
        <p class="subtitle">구글 로그인 후 게임을 시작할 수 있어요.</p>
        <button id="googleLoginBtn" class="primary-btn">Google 로그인</button>
        <div id="loginStatus" class="status"></div>
      </div>
    </section>

    <section id="nicknameScreen" class="screen">
      <div class="card">
        <h1 class="title">닉네임 설정</h1>
        <p class="subtitle">처음 가입하면 현재 설정된 가입 보상이 지급됩니다.</p>
        <div class="field">
          <label for="nicknameInput">닉네임</label>
          <input id="nicknameInput" type="text" maxlength="12" placeholder="닉네임 입력" autocomplete="off" />
        </div>
        <button id="startBtn" class="primary-btn" disabled>시작하기</button>
        <div id="nicknameStatus" class="status"></div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="main">
        <div class="main-box">
          <h1>주식 게임</h1>
          <p>아래 돈벌기 버튼을 눌러 현금을 모아보세요.<br />돈벌기는 60초마다 한 번씩 가능합니다.</p>
          <div id="earnedToast" class="earned-toast"></div>
        </div>
      </div>
    </section>

    <section id="settingsScreen" class="screen settings-screen">
      <div class="settings-page">
        <h1 class="title">설정</h1>
        <p class="subtitle">관리자만 수정할 수 있는 게임 기본값입니다.</p>

        <div class="settings-section">
          <div class="field">
            <label for="signupBonusInput">신규 가입 지급 금액</label>
            <div class="settings-row">
              <input id="signupBonusInput" type="number" inputmode="numeric" min="1" step="1" />
              <div class="won">원</div>
            </div>
          </div>

          <div class="field">
            <label for="earnMinInput">돈벌기 최소 지급 금액</label>
            <div class="settings-row">
              <input id="earnMinInput" type="number" inputmode="numeric" min="1" step="1" />
              <div class="won">원</div>
            </div>
          </div>

          <div class="field">
            <label for="earnMaxInput">돈벌기 최대 지급 금액</label>
            <div class="settings-row">
              <input id="earnMaxInput" type="number" inputmode="numeric" min="1" step="1" />
              <div class="won">원</div>
            </div>
          </div>

          <div class="hint">기본값: 신규 가입 1,000,000원 / 돈벌기 10,000원~50,000원</div>
          <div class="settings-divider"></div>
          <button id="saveSettingsBtn" class="primary-btn">저장하기</button>
          <button id="backToGameBtn" class="ghost-btn">뒤로가기</button>
          <div id="settingsStatus" class="status"></div>
        </div>
      </div>
    </section>

    <div id="adminMenuPanel" class="menu-panel">
      <button id="openSettingsBtn" class="menu-item">설정</button>
    </div>

    <footer id="bottomBar" class="bottom-bar">
      <button id="menuBtn" class="bar-btn menu">☰</button>
      <div class="center-info">
        <div id="barNickname" class="nickname">-</div>
        <div id="barCash" class="cash">0원</div>
      </div>
      <button id="earnBtn" class="bar-btn earn">돈벌기</button>
    </footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      onSnapshot,
      runTransaction,
      serverTimestamp,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOWdfAtywZ9UWEcFcsr0N5KI3D66d7XC0",
      authDomain: "stock-game-35183.firebaseapp.com",
      projectId: "stock-game-35183",
      storageBucket: "stock-game-35183.firebasestorage.app",
      messagingSenderId: "243838439967",
      appId: "1:243838439967:web:47b378ec6aef87e03f3b2a"
    };

    const ADMIN_EMAIL = "khu9918@gmail.com";
    const DEFAULT_SETTINGS = {
      signupBonus: 1000000,
      earnMin: 10000,
      earnMax: 50000
    };
    const EARN_COOLDOWN_SECONDS = 60;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    const screens = {
      loading: document.getElementById("loadingScreen"),
      login: document.getElementById("loginScreen"),
      nickname: document.getElementById("nicknameScreen"),
      game: document.getElementById("gameScreen"),
      settings: document.getElementById("settingsScreen")
    };

    const bottomBar = document.getElementById("bottomBar");
    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const loginStatus = document.getElementById("loginStatus");
    const nicknameInput = document.getElementById("nicknameInput");
    const startBtn = document.getElementById("startBtn");
    const nicknameStatus = document.getElementById("nicknameStatus");
    const barNickname = document.getElementById("barNickname");
    const barCash = document.getElementById("barCash");
    const earnBtn = document.getElementById("earnBtn");
    const earnedToast = document.getElementById("earnedToast");
    const menuBtn = document.getElementById("menuBtn");
    const adminMenuPanel = document.getElementById("adminMenuPanel");
    const openSettingsBtn = document.getElementById("openSettingsBtn");
    const signupBonusInput = document.getElementById("signupBonusInput");
    const earnMinInput = document.getElementById("earnMinInput");
    const earnMaxInput = document.getElementById("earnMaxInput");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const backToGameBtn = document.getElementById("backToGameBtn");
    const settingsStatus = document.getElementById("settingsStatus");

    let currentUser = null;
    let currentUserData = null;
    let currentSettings = { ...DEFAULT_SETTINGS };
    let currentScreenName = "loading";
    let unsubscribeUser = null;
    let unsubscribeSettings = null;
    let cooldownTimer = null;

    function isAdmin() {
      return currentUser && currentUser.email === ADMIN_EMAIL;
    }

    function showScreen(name) {
      currentScreenName = name;
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
      bottomBar.classList.toggle("active", name === "game" || name === "settings");
      closeAdminMenu();
    }

    function formatWon(value) {
      const safe = Number(value || 0);
      return safe.toLocaleString("ko-KR") + "원";
    }

    function setStatus(el, text, type = "") {
      el.textContent = text || "";
      el.className = "status" + (type ? " " + type : "");
    }

    function settingsRef() {
      return doc(db, "settings", "game");
    }

    function userRef(uid) {
      return doc(db, "users", uid);
    }

    async function ensureSettingsDocForAdmin() {
      const ref = settingsRef();
      const snap = await getDoc(ref);
      if (!snap.exists() && isAdmin()) {
        await setDoc(ref, {
          ...DEFAULT_SETTINGS,
          updatedAt: serverTimestamp(),
          updatedBy: currentUser.uid
        });
      }
    }

    function listenSettings() {
      if (unsubscribeSettings) unsubscribeSettings();
      unsubscribeSettings = onSnapshot(settingsRef(), (snap) => {
        if (snap.exists()) {
          const data = snap.data();
          currentSettings = {
            signupBonus: Number(data.signupBonus ?? DEFAULT_SETTINGS.signupBonus),
            earnMin: Number(data.earnMin ?? DEFAULT_SETTINGS.earnMin),
            earnMax: Number(data.earnMax ?? DEFAULT_SETTINGS.earnMax)
          };
        } else {
          currentSettings = { ...DEFAULT_SETTINGS };
        }
        fillSettingsInputs();
      });
    }

    function fillSettingsInputs() {
      signupBonusInput.value = currentSettings.signupBonus;
      earnMinInput.value = currentSettings.earnMin;
      earnMaxInput.value = currentSettings.earnMax;
    }

    function listenUser(uid) {
      if (unsubscribeUser) unsubscribeUser();
      unsubscribeUser = onSnapshot(userRef(uid), (snap) => {
        if (!snap.exists()) {
          currentUserData = null;
          showScreen("nickname");
          return;
        }
        currentUserData = snap.data();
        renderUserBar();
        if (!["game", "settings"].includes(currentScreenName)) {
          showScreen("game");
        }
        updateEarnButton();
      });
    }

    function renderUserBar() {
      if (!currentUserData) return;
      barNickname.textContent = currentUserData.nickname || "-";
      barCash.textContent = formatWon(currentUserData.cash || 0);
    }

    function getLastEarnDate() {
      const lastEarnAt = currentUserData?.lastEarnAt;
      if (!lastEarnAt) return null;
      if (lastEarnAt instanceof Timestamp) return lastEarnAt.toDate();
      if (lastEarnAt.toDate) return lastEarnAt.toDate();
      return null;
    }

    function getCooldownLeft() {
      const lastDate = getLastEarnDate();
      if (!lastDate) return 0;
      const passed = Math.floor((Date.now() - lastDate.getTime()) / 1000);
      return Math.max(0, EARN_COOLDOWN_SECONDS - passed);
    }

    function updateEarnButton() {
      if (cooldownTimer) clearInterval(cooldownTimer);

      const tick = () => {
        const left = getCooldownLeft();
        if (left > 0) {
          earnBtn.disabled = true;
          earnBtn.textContent = `${left}초`;
        } else {
          earnBtn.disabled = false;
          earnBtn.textContent = "돈벌기";
          if (cooldownTimer) {
            clearInterval(cooldownTimer);
            cooldownTimer = null;
          }
        }
      };

      tick();
      cooldownTimer = setInterval(tick, 1000);
    }

    function randomEarnAmount(min, max) {
      const safeMin = Math.max(1, Math.floor(Number(min || DEFAULT_SETTINGS.earnMin)));
      const safeMax = Math.max(safeMin, Math.floor(Number(max || DEFAULT_SETTINGS.earnMax)));
      return Math.floor(Math.random() * (safeMax - safeMin + 1)) + safeMin;
    }

    async function handleEarn() {
      if (!currentUser || !currentUserData) return;
      const left = getCooldownLeft();
      if (left > 0) {
        updateEarnButton();
        return;
      }

      const amount = randomEarnAmount(currentSettings.earnMin, currentSettings.earnMax);
      earnBtn.disabled = true;
      earnBtn.textContent = "처리중";

      try {
        await runTransaction(db, async (transaction) => {
          const ref = userRef(currentUser.uid);
          const snap = await transaction.get(ref);
          if (!snap.exists()) throw new Error("유저 데이터가 없습니다.");

          const data = snap.data();
          const lastEarnAt = data.lastEarnAt?.toDate ? data.lastEarnAt.toDate() : null;
          if (lastEarnAt) {
            const passed = Math.floor((Date.now() - lastEarnAt.getTime()) / 1000);
            if (passed < EARN_COOLDOWN_SECONDS) throw new Error("아직 돈벌기 시간이 남았습니다.");
          }

          transaction.update(ref, {
            cash: Number(data.cash || 0) + amount,
            lastEarnAt: serverTimestamp()
          });
        });

        earnedToast.textContent = `+${formatWon(amount)} 획득!`;
        setTimeout(() => { earnedToast.textContent = ""; }, 2500);
      } catch (error) {
        earnedToast.textContent = error.message || "돈벌기에 실패했습니다.";
        setTimeout(() => { earnedToast.textContent = ""; }, 2500);
      } finally {
        updateEarnButton();
      }
    }

    function toggleAdminMenu(event) {
      event.stopPropagation();
      if (!isAdmin()) {
        closeAdminMenu();
        return;
      }
      adminMenuPanel.classList.toggle("active");
    }

    function closeAdminMenu() {
      adminMenuPanel.classList.remove("active");
    }

    async function createNewUser() {
      const nickname = nicknameInput.value.trim();
      if (!nickname) return;
      startBtn.disabled = true;
      setStatus(nicknameStatus, "저장 중...");

      try {
        await setDoc(userRef(currentUser.uid), {
          nickname,
          cash: Number(currentSettings.signupBonus || DEFAULT_SETTINGS.signupBonus),
          lastEarnAt: null,
          createdAt: serverTimestamp(),
          lastLoginAt: serverTimestamp()
        });
        setStatus(nicknameStatus, "시작합니다!", "success");
      } catch (error) {
        setStatus(nicknameStatus, "닉네임 저장에 실패했습니다. Firestore 규칙과 설정값을 확인해주세요.", "error");
        startBtn.disabled = false;
      }
    }

    async function saveSettings() {
      if (!isAdmin()) return;
      const signupBonus = Number(signupBonusInput.value);
      const earnMin = Number(earnMinInput.value);
      const earnMax = Number(earnMaxInput.value);

      if (!Number.isFinite(signupBonus) || signupBonus <= 0) {
        setStatus(settingsStatus, "신규 가입 지급 금액은 0보다 커야 합니다.", "error");
        return;
      }
      if (!Number.isFinite(earnMin) || earnMin <= 0) {
        setStatus(settingsStatus, "돈벌기 최소 지급 금액은 0보다 커야 합니다.", "error");
        return;
      }
      if (!Number.isFinite(earnMax) || earnMax < earnMin) {
        setStatus(settingsStatus, "돈벌기 최대 지급 금액은 최소 지급 금액보다 크거나 같아야 합니다.", "error");
        return;
      }

      saveSettingsBtn.disabled = true;
      setStatus(settingsStatus, "저장 중...");
      try {
        await setDoc(settingsRef(), {
          signupBonus,
          earnMin,
          earnMax,
          updatedAt: serverTimestamp(),
          updatedBy: currentUser.uid
        }, { merge: true });
        setStatus(settingsStatus, "설정이 저장되었습니다.", "success");
      } catch (error) {
        setStatus(settingsStatus, "설정 저장에 실패했습니다. 관리자 권한을 확인해주세요.", "error");
      } finally {
        saveSettingsBtn.disabled = false;
      }
    }

    googleLoginBtn.addEventListener("click", async () => {
      setStatus(loginStatus, "구글 로그인으로 이동합니다...");
      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        setStatus(loginStatus, "로그인에 실패했습니다.", "error");
      }
    });

    nicknameInput.addEventListener("input", () => {
      startBtn.disabled = nicknameInput.value.trim().length === 0;
    });
    startBtn.addEventListener("click", createNewUser);
    earnBtn.addEventListener("click", handleEarn);
    menuBtn.addEventListener("click", toggleAdminMenu);
    adminMenuPanel.addEventListener("click", (event) => event.stopPropagation());
    document.addEventListener("click", () => closeAdminMenu());
    openSettingsBtn.addEventListener("click", () => {
      closeAdminMenu();
      fillSettingsInputs();
      setStatus(settingsStatus, "");
      showScreen("settings");
    });
    saveSettingsBtn.addEventListener("click", saveSettings);
    backToGameBtn.addEventListener("click", () => showScreen("game"));

    getRedirectResult(auth).catch(() => {});

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (!user) {
        currentUserData = null;
        if (unsubscribeUser) unsubscribeUser();
        if (unsubscribeSettings) unsubscribeSettings();
        showScreen("login");
        return;
      }

      try {
        await ensureSettingsDocForAdmin();
        listenSettings();
        await updateDoc(userRef(user.uid), { lastLoginAt: serverTimestamp() }).catch(() => {});
        const snap = await getDoc(userRef(user.uid));
        if (snap.exists()) {
          listenUser(user.uid);
        } else {
          currentUserData = null;
          showScreen("nickname");
        }
      } catch (error) {
        setStatus(loginStatus, "데이터를 불러오지 못했습니다. Firebase 규칙을 확인해주세요.", "error");
        showScreen("login");
      }
    });
  </script>
</body>
</html>
